<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Cirurgia</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f3057, #00587a, #008891);
            color: white;
            padding: 40px;
        }

        .container {
            max-width: 900px;
            margin: auto;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 20px;
        }

        h2 {
            margin-bottom: 30px;
            font-weight: 600;
            text-align: center;
        }

        form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 14px;
            margin-bottom: 6px;
            opacity: 0.9;
        }

        input, select {
            padding: 10px;
            border-radius: 8px;
            border: none;
            outline: none;
            font-size: 14px;
        }

        input:focus, select:focus {
            box-shadow: 0 0 5px #00ffd5;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        .btn-area {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .btn {
            padding: 12px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
            border: none;
            cursor: pointer;
        }

        .btn-save {
            background: #00ffd5;
            color: #003333;
        }

        .btn-save:hover {
            background: #00c9aa;
        }

        .btn-cancel {
            background: #dc3545;
            color: white;
        }

        .btn-cancel:hover {
            background: #b02a37;
        }

        @media(max-width: 600px) {
            body {
                padding: 20px;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <h2 th:text="${cirurgia.id == null} ? '➕ Nova Cirurgia' : '✏️ Editar Cirurgia'"></h2>

    <form th:action="@{/cirurgias/salvar}" th:object="${cirurgia}" method="post">

        <input type="hidden" th:field="*{id}"/>

        <div class="form-group">
            <label>Data</label>
            <input type="date" th:field="*{data}" required />
        </div>

        <div class="form-group">
            <label>Horário</label>
            <input type="time" th:field="*{horario}" required />
        </div>

        <div class="form-group">
            <label>Paciente</label>
            <input type="text" th:field="*{paciente}" placeholder="Nome do paciente" required />
        </div>

        <div>
            <div>
                <label>Procedimento</label>
                <select name="procedimentoId" required>
                    <option value="">Selecione</option>
                    <option th:each="p : ${procedimentos}"
                            th:value="${p.id}"
                            th:text="${p.codigo + ' - ' + p.nome}">
                    </option>
                </select>
            </div>
            </select>
        </div>

        <div class="form-group">
            <label>Cirurgião</label>
            <input type="text" th:field="*{cirurgiao}" placeholder="Nome do cirurgião" required />
        </div>

        <div class="form-group">
            <label>Sala</label>
            <input type="text" th:field="*{sala}" placeholder="Ex: 01" required />
        </div>

        <div class="form-group full-width">
            <label>Status</label>
            <select name="status">

                <option value="AGENDADA">Agendada</option>
                <option value="EM_ANDAMENTO">Em Andamento</option>
                <option value="FINALIZADA">Finalizada</option>
                <option value="CANCELADA">Cancelada</option>
            </select>
        </div>

        <div class="btn-area">
            <a class="btn btn-cancel" th:href="@{/cirurgias}">
                Cancelar
            </a>

            <button type="submit" class="btn btn-save">
                💾 Salvar
            </button>
        </div>

    </form>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mapa Cirúrgico</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f3057, #00587a, #008891);
            color: white;
            padding: 40px;
        }

        .container {
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
        }

        h2 {
            font-weight: 600;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .btn {
            padding: 10px 18px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
            display: inline-block;
        }

        .btn-primary {
            background: #00ffd5;
            color: #003333;
        }

        .btn-primary:hover {
            background: #00c9aa;
        }

        .btn-edit {
            background: #ffc107;
            color: black;
        }

        .btn-delete {
            background: #dc3545;
            color: white;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .filter-form {
            margin-bottom: 25px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-form input,
        .filter-form select {
            padding: 10px;
            border-radius: 8px;
            border: none;
            min-width: 160px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            overflow: hidden;
            border-radius: 15px;
            background: rgba(255,255,255,0.1);
        }

        th, td {
            padding: 14px;
            text-align: center;
        }

        th {
            background: rgba(0,0,0,0.4);
            font-weight: 600;
        }

        tr:nth-child(even) {
            background: rgba(255,255,255,0.05);
        }

        tr:hover {
            background: rgba(255,255,255,0.15);
        }

        .badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .agendada { background: #17a2b8; }
        .andamento { background: #ffc107; color: black; }
        .finalizada { background: #28a745; }
        .cancelada { background: #dc3545; }

        @media(max-width: 900px) {
            table { font-size: 13px; }
            .top-bar { flex-direction: column; align-items: flex-start; }
        }
        .cancelada {
            background: #dc3545;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="top-bar">
        <h2>📋 Mapa Cirúrgico</h2>

        <div>
            <a class="btn btn-primary" th:href="@{/cirurgias/nova}">
                + Nova Cirurgia
            </a>

            <a class="btn" th:href="@{/}" style="color:white;">
                ← Voltar ao Dashboard
            </a>
        </div>
    </div>

    <!-- FILTRO -->
    <form method="get" th:action="@{/cirurgias}" class="filter-form">

        <input type="text"
               name="paciente"
               placeholder="Paciente"
               th:value="${paciente}" />

        <input type="text"
               name="procedimento"
               placeholder="Procedimento"
               th:value="${procedimento}" />

        <input type="date"
               name="data"
               th:value="${data}" />

        <select name="status">
            <option value="">Todos Status</option>
            <option value="AGENDADA">Agendada</option>
            <option value="EM_ANDAMENTO">Em Andamento</option>
            <option value="FINALIZADA">Finalizada</option>
            <option value="CANCELADA">Cancelada</option>
        </select>

        <button type="submit" class="btn btn-primary">🔎 Filtrar</button>

        <a th:href="@{/cirurgias}" class="btn btn-secondary">Limpar</a>

    </form>

    <!-- TABELA -->
    <table>
        <thead>
        <tr>
            <th>Data</th>
            <th>Horário</th>
            <th>Paciente</th>
            <th>Procedimento</th>
            <th>Cirurgião</th>
            <th>Sala</th>
            <th>Status</th>
            <th>Ações</th>
        </tr>
        </thead>
        <tbody>

        <tr th:each="c : ${cirurgias}">
            <td th:text="${#temporals.format(c.data, 'dd/MM/yyyy')}"></td>
            <td th:text="${c.horario}"></td>
            <td th:text="${c.paciente}"></td>
            <td th:text="${c.procedimento.nome}"></td>
            <td th:text="${c.cirurgiao}"></td>
            <td th:text="${c.sala}"></td>

            <td>
            <span class="badge"
                  th:text="${c.status}"
                  th:classappend="
                    ${c.status.name() == 'AGENDADA'} ? ' agendada' :
                    (${c.status.name() == 'EM_ANDAMENTO'} ? ' andamento' :
                    (${c.status.name() == 'FINALIZADA'} ? ' finalizada' :
                    ' cancelada'))">
            </span>
            </td>

            <td>
                <a class="btn btn-edit"
                   th:href="@{'/cirurgias/editar/' + ${c.id}}">
                    Editar
                </a>

                <a class="btn btn-delete"
                   th:href="@{'/cirurgias/excluir/' + ${c.id}}"
                   onclick="return confirm('Deseja realmente excluir?')">
                    Excluir
                </a>
            </td>
        </tr>

        <tr th:if="${#lists.isEmpty(cirurgias)}">
            <td colspan="8">Nenhuma cirurgia encontrada.</td>
        </tr>

        </tbody>
    </table>

</div>

</body>
</html>

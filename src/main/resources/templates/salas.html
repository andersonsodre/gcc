<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Salas Cirúrgicas</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg,#0f3057,#00587a,#008891);
            color: white;
            font-family: 'Poppins', sans-serif;
            padding: 40px;
        }

        .container {
            background: rgba(0,0,0,0.35);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        h2 {
            margin-bottom: 25px;
            font-weight: 600;
        }

        .acoes-topo {
            margin-bottom: 25px;
        }

        .btn-nova {
            background: #00ffd5;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            color: #003333;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-nova:hover {
            opacity: 0.8;
        }

        .btn-voltar {
            color: white;
            margin-left: 20px;
            text-decoration: none;
            font-weight: 500;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            overflow: hidden;
        }

        thead {
            background: rgba(0,0,0,0.4);
        }

        th, td {
            padding: 14px 16px;
            text-align: left;
            vertical-align: middle;
        }

        th {
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        tbody tr {
            border-top: 1px solid rgba(255,255,255,0.1);
            transition: 0.2s;
        }

        tbody tr:hover {
            background: rgba(255,255,255,0.05);
        }

        .badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }

        .ativa {
            background: #28a745;
        }

        .inativa {
            background: #dc3545;
        }

        .acoes a {
            text-decoration: none;
            font-weight: 500;
            margin-right: 10px;
        }

        .editar {
            color: #ffc107;
        }

        .excluir {
            color: #ff4d4d;
        }

    </style>
</head>
<body>

<div class="container">

    <h2>🏥 Gestão de Salas Cirúrgicas</h2>

    <div class="acoes-topo">
        <a th:href="@{/salas/nova}" class="btn-nova">
            + Nova Sala
        </a>

        <a th:href="@{/}" class="btn-voltar">
            ← Voltar ao Dashboard
        </a>
    </div>

    <table>
        <thead>
        <tr>
            <th style="width:25%">Nome</th>
            <th style="width:35%">Descrição</th>
            <th style="width:15%">Status</th>
            <th style="width:25%">Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="s : ${salas}">
            <td th:text="${s.nome}"></td>
            <td th:text="${s.descricao}"></td>
            <td>
                <span th:if="${s.ativa}" class="badge ativa">Ativa</span>
                <span th:unless="${s.ativa}" class="badge inativa">Inativa</span>
            </td>
            <td class="acoes">
                <a th:href="@{'/salas/editar/' + ${s.id}}" class="editar">Editar</a>
                |
                <a th:href="@{'/salas/excluir/' + ${s.id}}"
                   onclick="return confirm('Deseja excluir esta sala?')"
                   class="excluir">Excluir</a>
            </td>
        </tr>
        </tbody>
    </table>

</div>

</body>
</html>

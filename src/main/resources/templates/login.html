<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Centro Cirúrgico | Acesso Seguro</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #0c1f3f, #154c79);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 50px 40px;
            width: 380px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
            color: #fff;
            animation: fadeIn 0.8s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            text-align: center;
            margin-bottom: 25px;
        }

        .logo h1 {
            font-size: 20px;
            font-weight: 500;
            margin: 0;
            letter-spacing: 1px;
        }

        .logo span {
            font-size: 13px;
            opacity: 0.8;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        input {
            width: 100%;
            padding: 14px 45px 14px 15px;
            border-radius: 12px;
            border: none;
            font-size: 14px;
            outline: none;
        }

        input:focus {
            box-shadow: 0 0 0 2px #3da9fc;
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 13px;
            color: #333;
        }

        button {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #3da9fc, #1f6feb);
            color: white;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(61, 169, 252, 0.4);
        }

        .alert {
            margin-top: 15px;
            padding: 10px;
            border-radius: 10px;
            font-size: 13px;
            text-align: center;
        }

        .error {
            background: rgba(255, 0, 0, 0.2);
        }

        .success {
            background: rgba(0, 255, 150, 0.2);
        }

        .footer {
            margin-top: 25px;
            text-align: center;
            font-size: 12px;
            opacity: 0.7;
        }
    </style>
</head>

<body>

<div class="login-container">

    <div class="logo">
        <h1>GCC - Centro Cirúrgico</h1>
        <span>Acesso Restrito</span>
    </div>

    <form th:action="@{/login}" method="post">

        <div class="form-group">
            <input type="text" name="username" placeholder="Usuário" required />
        </div>

        <div class="form-group">
            <input type="password" id="password" name="password" placeholder="Senha" required />
            <span class="toggle-password" onclick="togglePassword()">Mostrar</span>
        </div>

        <button type="submit">Entrar no Sistema</button>

    </form>

    <div th:if="${param.error}" class="alert error">
        Usuário ou senha inválidos.
    </div>

    <div th:if="${param.logout}" class="alert success">
        Logout realizado com sucesso.
    </div>

    <div class="footer">
        © 2026 GCC • PSDRM
    </div>

</div>

<script>
    function togglePassword() {
        const passwordInput = document.getElementById("password");
        const toggleText = document.querySelector(".toggle-password");

        if (passwordInput.type === "password") {
            passwordInput.type = "text";
            toggleText.innerText = "Ocultar";
        } else {
            passwordInput.type = "password";
            toggleText.innerText = "Mostrar";
        }
    }
</script>

</body>
</html>
